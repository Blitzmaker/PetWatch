services:
  # Backoffice für User/Hunde/Foods + eigene Collections
  directus:
    image: directus/directus:11
    restart: unless-stopped
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-dogwatch}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8055:8055"
    depends_on:
      postgres:
        condition: service_healthy

  # Headless CMS für News/Beiträge
  strapi:
    image: vshadbolt/strapi:latest
    restart: unless-stopped
    environment:
      CI: "true"
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapi_db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${STRAPI_DB_NAME:-strapi}
      DATABASE_USERNAME: ${STRAPI_DB_USER:-strapi}
      DATABASE_PASSWORD: ${STRAPI_DB_PASSWORD:-strapi}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
    ports:
      - "1337:1337"
    command: >
      sh -c "mkdir -p /srv/app/strapi && if [ ! -f /srv/app/strapi/package.json ]; then npx create-strapi-app@latest /srv/app/strapi --dbclient=postgres --dbhost=$DATABASE_HOST --dbport=$DATABASE_PORT --dbname=$DATABASE_NAME --dbusername=$DATABASE_USERNAME --dbpassword=$DATABASE_PASSWORD --no-run --skip-cloud --no-example --yes; fi && npm --prefix /srv/app/strapi run develop"
    volumes:
      - strapi_data:/srv/app
    depends_on:
      strapi_db:
        condition: service_healthy

  strapi_db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${STRAPI_DB_NAME:-strapi}
      POSTGRES_USER: ${STRAPI_DB_USER:-strapi}
      POSTGRES_PASSWORD: ${STRAPI_DB_PASSWORD:-strapi}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - strapi_postgres_data:/var/lib/postgresql/data

  # Community-Forum
  flarum:
    image: mondedie/flarum:latest
    restart: unless-stopped
    environment:
      # offizielle Variablennamen des mondedie/flarum Images
      FLARUM_URL: ${FLARUM_SITE_URL:-http://localhost:8080}
      FLARUM_TITLE: ${FLARUM_TITLE:-PetWatch Community}
      FLARUM_ADMIN_USER: ${FLARUM_ADMIN_USER:-admin}
      FLARUM_ADMIN_PASS: ${FLARUM_ADMIN_PASSWORD:-change-me}
      FLARUM_ADMIN_MAIL: ${FLARUM_ADMIN_EMAIL:-admin@petwatch.local}
      MYSQL_HOST: flarum_db
      MYSQL_DATABASE: ${FLARUM_DB_NAME:-flarum}
      MYSQL_USER: ${FLARUM_DB_USER:-flarum}
      MYSQL_PASSWORD: ${FLARUM_DB_PASSWORD:-flarum}

      # Legacy-/Kompatibilitätsvariablen (falls ein älteres Tag genutzt wird)
      DB_HOST: flarum_db
      DB_NAME: ${FLARUM_DB_NAME:-flarum}
      DB_USER: ${FLARUM_DB_USER:-flarum}
      DB_PASS: ${FLARUM_DB_PASSWORD:-flarum}
      FORUM_URL: ${FLARUM_SITE_URL:-http://localhost:8080}
      FORUM_TITLE: ${FLARUM_TITLE:-PetWatch Community}
      ADMIN_USER: ${FLARUM_ADMIN_USER:-admin}
      ADMIN_PASS: ${FLARUM_ADMIN_PASSWORD:-change-me}
      ADMIN_MAIL: ${FLARUM_ADMIN_EMAIL:-admin@petwatch.local}
    ports:
      - "8080:8888"
    depends_on:
      flarum_db:
        condition: service_healthy

  flarum_db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${FLARUM_DB_NAME:-flarum}
      MYSQL_USER: ${FLARUM_DB_USER:-flarum}
      MYSQL_PASSWORD: ${FLARUM_DB_PASSWORD:-flarum}
      MYSQL_ROOT_PASSWORD: ${FLARUM_DB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - flarum_mariadb_data:/var/lib/mysql

volumes:
  strapi_data:
  strapi_postgres_data:
  flarum_mariadb_data:
